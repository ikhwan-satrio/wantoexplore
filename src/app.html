<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			(function () {
				try {
					var mode = localStorage.getItem('mode-watcher-mode');
					if (mode === 'dark' || (!mode && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
						document.documentElement.classList.add('dark');
					}
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="splash" style="
			position: fixed; inset: 0; z-index: 9999;
			display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
			background: #0a0a0a; color: #e5e5e5;
			transition: opacity 0.3s ease;
		">
			<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.6;">
				<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
			</svg>
			<div style="font-family: monospace; font-size: 14px; opacity: 0.4;">teddypicker</div>
			<div style="width: 32px; height: 32px; border: 2px solid #333; border-top-color: #e5e5e5; border-radius: 50%; animation: splash-spin 0.8s linear infinite;"></div>
		</div>
		<style>
			@keyframes splash-spin { to { transform: rotate(360deg); } }
			.dark { color-scheme: dark; }
			html, body { background: #0a0a0a; margin: 0; padding: 0; }
		</style>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
